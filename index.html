<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <title>Nudo Gordiano - Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; }
        #live-indicators { background: #f4f4f4; padding: 20px; border-radius: 8px; border-left: 5px solid #007bff; }
        .val { font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>
    <div class='container'>
        <h1>El Nudo Gordiano de la Economía Chilena</h1>
        <p>Dashboard de simulación y monitoreo de ineficiencias estructurales.</p>

        <div id='live-indicators'>
            <h4>📊 Indicadores en Tiempo Real (vía mindicador.cl)</h4>
            <p>UF: <span id='val-uf' class='val'>Cargando...</span></p>
            <p>Dólar: <span id='val-dolar' class='val'>Cargando...</span></p>
            <p>IPC: <span id='val-ipc' class='val'>Cargando...</span></p>
            <small>Última actualización: <span id='fecha-act'>-</span></small>
        </div>
    </div>

    <script>
        async function fetchIndicators() {
            try {
                const response = await fetch('https://mindicador.cl/api');
                if (!response.ok) throw new Error('API Error');
                const data = await response.json();
                
                document.getElementById('val-uf').innerText = '$' + data.uf.valor.toLocaleString('es-CL');
                document.getElementById('val-dolar').innerText = '$' + data.dolar.valor.toLocaleString('es-CL');
                document.getElementById('val-ipc').innerText = data.ipc.valor + '%';
                document.getElementById('fecha-act').innerText = new Date().toLocaleString();
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('live-indicators').innerHTML += '<p style="color:red">Error al cargar indicadores.</p>';
            }
        }
        window.onload = fetchIndicators;
    </script>
</body>
</html>
