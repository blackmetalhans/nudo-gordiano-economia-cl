<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <title>Nudo Gordiano - Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; background-color: #fff; color: #333; }
        .container { max-width: 800px; margin: auto; }
        #live-indicators { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; border-left: 5px solid #007bff; margin-top: 20px; }
        .val { font-weight: bold; color: #d9534f; font-size: 1.2em; }
        .label { color: #555; }
    </style>
</head>
<body>
    <div class='container'>
        <h1>El Nudo Gordiano de la Economía Chilena</h1>
        <p>Dashboard de monitoreo de indicadores económicos fundamentales.</p>

        <div id='live-indicators'>
            <h4>📊 Indicadores Económicos (Live API)</h4>
            <p><span class='label'>UF:</span> <span id='val-uf' class='val'>...</span></p>
            <p><span class='label'>Dólar:</span> <span id='val-dolar' class='val'>...</span></p>
            <p><span class='label'>IPC:</span> <span id='val-ipc' class='val'>...</span></p>
            <hr>
            <small>Fuente: mindicador.cl | Sincronizado: <span id='fecha-act'>-</span></small>
        </div>
    </div>

    <script>
        async function fetchIndicators() {
            try {
                const response = await fetch('https://mindicador.cl/api');
                if (!response.ok) throw new Error('API unreachable');
                const data = await response.json();
                
                document.getElementById('val-uf').innerText = '$' + data.uf.valor.toLocaleString('es-CL');
                document.getElementById('val-dolar').innerText = '$' + data.dolar.valor.toLocaleString('es-CL');
                document.getElementById('val-ipc').innerText = data.ipc.valor + '%';
                document.getElementById('fecha-act').innerText = new Date().toLocaleString('es-CL');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('live-indicators').innerHTML += '<p style="color:red">Error al conectar con la API de indicadores.</p>';
            }
        }
        window.onload = fetchIndicators;
    </script>
</body>
</html>
